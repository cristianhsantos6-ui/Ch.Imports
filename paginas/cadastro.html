<!DOCTYPE html>
<html lang="pt-br">


 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch.Imports</title>

    <link rel="stylesheet" href="../css/style_formulario.css">
</head>
    
<form id="FormCadastro"></form>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
               <a href="../index.html"> Ch.Imports</a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="../paginas/sobre.html">Sobre</a></li>
                    <li><a href="../paginas/login.html">Login</a></li>
                    <li><a href="../paginas/carrinho.html"><img src="../imagens/ChatGPT Image 6 de jul. de 2026, 13_45_24.png" alt="Carrinho"></a></li>
                </ul>
            </nav>
        </header>

        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" class="input-pesquisa" placeholder="Digite seu produto">
        </section>

        <section id="form">
            <h3>Cadastro Pessoa</h3>

            <form id="form-pessoa">
                <label form="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input001" required maxlength="60" placeholder="Digite seu Nome Completo">
            

                <label form="nome">cpf</label>
                <input type="text" name="cpf" id="cpf" class="input002" required maxlength="14" placeholder="Digite seu CPF">
                
                <label form="nome">telefone</label>
                <input type="text" name="telefone" id="telefone" class="input003" required maxlength="20" placeholder="Digite seu telefone">
                
                <label form="nome">Email</label>
                <input type="text" name="Email" id="Email" class="input001" required maxlength="45" placeholder="Digite seu Email">
            
                <label form="nome">Data Nascimento</label>
                <input type="text" name="Data Nascimento" id="Data Nascimento" class="input003" required maxlength="10" placeholder="Digite sua Data de Nascimento">
            
                <label form="nome">CEP</label>
                <input type="text" name="CEP" id="CEP" class="input003" required maxlength="10" placeholder="Digite o CEP">
            
                <label form="nome">Logradoura</label>
                <input type="text" name="Logradoura" id="Logradoura" class="input001" required maxlength="30" placeholder="Digite a Logradoura">
            
                <label form="nome">Número</label>
                <input type="text" name="Número" id="Número" class="input003" required maxlength="5" placeholder="Digite o Número">
            
                <label form="nome">Complemento</label>
                <input type="text" name="Complemento" id="Complemento" class="input001" required maxlength="20" placeholder="Digite o Complemento">
            
                <label form="nome">Bairro</label>
                <input type="text" name="Bairro" id="Bairro" class="input001" required maxlength="50" placeholder="Digite o Bairro">
            
                <label form="nome">Cidade</label>
                <input type="text" name="Cidade" id="Cidade" class="input001" required maxlength="50" placeholder="Digite a Cidade">
            
                <label form="nome">Estado</label>
                <input type="text" name="Estado" id="Estado" class="input003" required maxlength="3" placeholder="Digite o Uf">
            
                <label form="nome">Senha</label>
                <input type="text" name="Senha" id="Senha" class="input001" required maxlength="10" placeholder="Digite a Senha">

                <input type="checkbox" name="termos" id="termos">

                <button>Cadastrar</button>
                <button>Limpar</button>
            
            </form>
         
        </section>

        <footer id="rodape">
            <h2>&copy 2026 Ch.Imports Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartão de Débito ou Crédito</p>
        </footer>

    </main>
     
    <script src="../js/scrip_cadastro.js"></script>
</body>

</html>
