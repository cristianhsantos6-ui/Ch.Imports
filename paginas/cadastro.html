<!DOCTYPE html>
<html lang="pt-br">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch.Imports</title>
    <link rel="stylesheet" href="../css/style_formulario.css">
</head>



<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
               <a href="../index.html">Ch.Imports</a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="../paginas/sobre.html">Sobre</a></li>
                    <li><a href="../paginas/login.html">Login</a></li>
                    <li><a href="../paginas/carrinho.html"><img src="../imagens/ChatGPT Image 6 de jul. de 2026, 13_45_24.png" alt="Carrinho"></a></li>
                </ul>
            </nav>
        </header>

        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa-input" class="input-pesquisa" placeholder="Digite seu produto">
        </section>

        <!-- AREA DO CONTEÚDO PRINCIPAL (Flexbox controla o lado a lado aqui) -->
        <section id="form">
            
            <!-- COLUNA DA ESQUERDA: O Formulário -->
            <div class="form-area">
                <h3>Cadastro Pessoa</h3>

                <form id="form-pessoa">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" class="input001" required maxlength="60" placeholder="Digite seu Nome Completo">
                
                    <label for="cpf">CPF</label>
                    <input type="text" name="cpf" id="cpf" class="input002" required maxlength="14" placeholder="Digite seu CPF">
                    
                    <label for="telefone">Telefone</label>
                    <input type="text" name="telefone" id="telefone" class="input003" required maxlength="20" placeholder="Digite seu telefone">
                    
                    <label for="Email">Email</label>
                    <input type="Email" name="Email" id="Email" class="input001" required maxlength="45" placeholder="Digite seu Email">
                
                    <label for="data-nascimento">Data Nascimento</label>
                    <input type="text" name="data-nascimento" id="data-nascimento" class="input003" required maxlength="10" placeholder="Digite sua Data de Nascimento">
                
                    <label for="CEP">CEP</label>
                    <input type="text" name="CEP" id="CEP" class="input003" required maxlength="10" placeholder="Digite o CEP">
                
                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input001" required maxlength="30" placeholder="Digite o Logradouro">
                
                    <label for="numero">Número</label>
                    <input type="text" name="numero" id="numero" class="input003" required maxlength="5" placeholder="Digite o Número">
                
                    <label for="complemento">Complemento</label>
                    <input type="text" name="complemento" id="complemento" class="input001" required maxlength="20" placeholder="Digite o Complemento">
                
                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input001" required maxlength="50" placeholder="Digite o Bairro">
                
                    <label for="cidade">Cidade</label>
                    <input type="text" name="cidade" id="cidade" class="input001" required maxlength="50" placeholder="Digite a Cidade">
                
                    <label for="estado">Estado</label>
                    <input type="text" name="estado" id="estado" class="input003" required maxlength="3" placeholder="Digite o Uf">
                
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" class="input001" required maxlength="10" placeholder="Digite a Senha">

                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" name="termos" id="termos">
                        <label for="termos" style="margin: 0;">Aceito os termos</label>
                    </div>

                    <button type="submit">Cadastrar</button>
                    <button type="reset">Limpar</button>
                </form>
            </div>

            <div id="dados-cadastrados" class="escondido">
                <h3>Dados Cadastrados</h3>
                <div id="lista-dados"></div>
            </div>
         
        </section>

        <footer id="rodape">
            <h2>&copy 2026 Ch.Imports Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartão de Débito ou Crédito</p>
        </footer>

    </main>
     
    <script src="../js/scrip_cadastro.js"></script>
</body>
</html>
