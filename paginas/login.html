<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ch.Imports</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                Ch.Imports
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="paginas/cadastro.html">cadastro</a></li>
                    <li><a href="paginas/sobre.html">sobre</a></li>
                    <li><a href="paginas/login.html">login</a></li>
                    <li><a href="paginas/carrinho.html"><img src="" alt="Carrinho"></a></li>
                
                </ul>
            </nav>

        </header>

        <section id="login">

            <div class="caixa-login">

                <h1>Entrar</h1>

                <p>Faça login para acessar sua conta.</p>

                <form>

                    <label>Email</label>
                    <input type="email" placeholder="Digite seu email" required>

                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha" required>

                    <button type="submit">Entrar</button>

                </form>

                <p class="cadastro">
                    Não possui uma conta?
                    <a href="cadastro.html">Cadastre-se</a>
                </p>

            </div>

        </section>

        <footer id="rodape">
            <h2>&copy; 2026 Ch.Imports - Todos os direitos reservados</h2>
            <p>Pix | Cartão de Crédito | Cartão de Débito</p>
        </footer>

    </main>

</body>

</html>
