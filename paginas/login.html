<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ch.Imports</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                Ch.Imports
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="/paginas/cadastro.html">Cadastro</a></li>
                    <li><a href="../paginas/sobre.html">Sobre</a></li>
                    <li><a href="../paginas/login.html">Login</a></li>
                    <li><a href="carrinho.html"><img src="../imagens/ChatGPT Image 6 de jul. de 2026, 13_45_24.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <section id="login">

            <h1>Login</h1>

            <form id="formLogin">

                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Digite seu e-mail">

                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="Digite sua senha">

                <button type="submit">Entrar</button>

            </form>

            <p>
                Não possui conta?
                <a href="cadastro.html">Cadastre-se</a>
            </p>

        </section>

        <footer id="rodape">
            <h2>&copy; 2026 Ch.Imports - Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartão de Débito ou Crédito</p>
        </footer>

    </main>

    <script src="../js/scrip_login.js"></script>

</body>

</html>
